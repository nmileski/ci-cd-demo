name: Laravel CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Run Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: root
      DB_PASSWORD: root
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql, bcmath
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Copy .env file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Security audit (composer audit)
        run: composer audit

      - name: Static analysis (Larastan/PHPStan)
        run: ./vendor/bin/phpstan analyse --memory-limit=1G

      - name: Generate app key
        run: php artisan key:generate

      - name: Set storage/cache permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Forbid debug statements (dd, dump, var_dump)
        run: |
          if grep -rn --include='*.php' -E '\b(dd|dump|var_dump|print_r)\(' app/ routes/ database/ tests/; then
            echo "::error::Debug statement(s) found above. Remove dd()/dump()/var_dump()/print_r() before committing."
            exit 1
          fi

      - name: Forbid console.log statements
        run: |
          if grep -rn --include='*.js' --include='*.jsx' --include='*.ts' --include='*.tsx' -E 'console\.(log|debug)\(' resources/js/; then
            echo "::error::console.log/debug found above. Remove before committing."
            exit 1
          fi

      - name: Check code style (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Run the test suite with coverage
        run: php artisan test --coverage --min=50

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Simulate deployment
        run: |
          echo "Deploying to production..."
          echo "Pulling latest code"
          echo "Installing production dependencies"
          echo "Running database migrations"
          echo "Clearing and rebuilding caches"
          echo "Deployment complete!"